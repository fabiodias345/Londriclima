services:
  postgres:
    image: postgres:16-alpine
    container_name: londriclima-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: londriclima_dev
      POSTGRES_USER: londriclima
      POSTGRES_PASSWORD: londriclima
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - londriclima_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U londriclima -d londriclima_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: londriclima-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  londriclima_postgres_data:
